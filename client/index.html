<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>SPRK* Prototype</title>
    <link rel="icon" type="image/png" href="./assets/brand/sprk-favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <form name="sprk-prototype-access" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="sprk-prototype-access" />
      <input name="firstName" />
      <input name="lastName" />
      <input name="email" />
      <input name="submittedAt" />
      <input name="visitId" />
      <input name="entryPath" />
      <input name="referrer" />
      <input name="userAgent" />
      <input name="timezone" />
      <input name="source" />
      <input name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
